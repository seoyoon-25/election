version: "3.8"

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Required environment variables (set in .env.prod or environment):
# - POSTGRES_PASSWORD
# - REDIS_PASSWORD
# - JWT_SECRET_KEY
# - MINIO_ROOT_PASSWORD
# - S3_ACCESS_KEY
# - S3_SECRET_KEY

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: campaign-os-postgres
    restart: always
    environment:
      POSTGRES_USER: campaign_os
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: campaign_os
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No port exposure in production - only internal network access
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campaign_os -d campaign_os"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # Redis Cache with Authentication
  redis:
    image: redis:7-alpine
    container_name: campaign-os-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - ENVIRONMENT=production
    container_name: campaign-os-backend
    restart: always
    environment:
      # Database
      DATABASE_URL: postgresql://campaign_os:${POSTGRES_PASSWORD}@postgres:5432/campaign_os
      # Redis with password
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      # Security - NO DEFAULTS, must be provided
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      # App settings
      ENVIRONMENT: production
      DEBUG: "false"
      LOG_LEVEL: INFO
      # S3/MinIO
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY is required}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY is required}
      S3_BUCKET_NAME: campaign-os
      # CORS - set your production domain
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://election.bestcome.org}
    expose:
      - "8000"
    # No volume mounts in production - code is baked into image
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend-network
      - frontend-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Next.js Frontend (Production Build)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://election.bestcome.org/api/v1}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://election.bestcome.org}
    container_name: campaign-os-frontend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - frontend-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO S3-compatible storage
  minio:
    image: minio/minio:latest
    container_name: campaign-os-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    expose:
      - "9000"
      - "9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Nginx Reverse Proxy (optional - if not using external load balancer)
  nginx:
    image: nginx:alpine
    container_name: campaign-os-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks:
      - frontend-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

networks:
  backend-network:
    driver: bridge
    internal: true  # No external access
  frontend-network:
    driver: bridge
