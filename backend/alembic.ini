# Alembic Configuration File

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Set to true to run offline migrations without connecting to the database
prepend_sys_path = .

# Timezone for revision timestamps
timezone = UTC

# Max length for truncated auto-generated revision IDs
truncate_slug_length = 40

# Set to true to create revisions with dependency tracking
revision_environment = false

# Version locations
version_locations = %(here)s/alembic/versions

# Disable auto-detection in version scripts
sourceless = false

# Version path separator
version_path_separator = os

# Output encoding for migration files
output_encoding = utf-8

# Database URL (will be overridden by env.py)
sqlalchemy.url = postgresql://campaign_os:campaign_os@localhost:5432/campaign_os


[post_write_hooks]
# Run black on generated migrations
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -q


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
